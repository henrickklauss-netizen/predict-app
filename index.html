<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Predict Market</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body style="font-family: Arial; padding: 24px;">

  <h1>🚀 Predict Market</h1>
  <p id="user"></p>
<p id="balance"></p>
  <div style="border: 1px solid #ddd; border-radius: 16px; padding: 20px; margin-top: 24px;">
    <h2>BTC будет выше $100k до конца года?</h2>
    <p>Текущая вероятность: <b>57%</b></p>

    <button onclick="betYes()" style="padding: 12px 20px; margin-right: 8px;">
      YES
    </button>

    <button onclick="betNo()" style="padding: 12px 20px;">
      NO
    </button>

    <p id="result" style="margin-top: 16px;"></p>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const user = tg.initDataUnsafe?.user;

    if (user) {
      document.getElementById("user").innerText =
        "Привет, " + user.first_name;
    }
let balance = localStorage.getItem("balance");

if (!balance) {
  balance = 1000;
  localStorage.setItem("balance", balance);
}

document.getElementById("balance").innerText =
  "Баланс: " + balance + " монет";
    function betYes() {
  placeBet("YES");
}

function betNo() {
  placeBet("NO");
}

function placeBet(choice) {
  let balance = Number(localStorage.getItem("balance") || 1000);

  if (balance < 100) {
    document.getElementById("result").innerText =
      "Недостаточно монет для ставки";
    return;
  }

  balance = balance - 100;
  localStorage.setItem("balance", balance);
  localStorage.setItem("bet", choice);

  document.getElementById("balance").innerText =
    "Баланс: " + balance + " монет";
  showBet();
}

function showBet() {
  const bet = localStorage.getItem("bet");

  if (bet) {
    document.getElementById("result").innerText =
      "Твоя текущая позиция: " + bet;
  }
}

showBet();
  </script>

</body>
</html>
</body>
</html>
